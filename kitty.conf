# Kitty Configuration
# VSCode Dark Theme with Droid Sans Mono Nerd Font

#: Fonts {{{

# Use Droid Sans Mono Nerd Font
font_family      DroidSansM Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Font size
font_size 11.0

# Disable ligatures if needed (uncomment to disable)
# disable_ligatures never

#: }}}

#: Theme - VSCode Dark {{{

# The basic colors
foreground              #cccccc
background              #1e1e1e
selection_foreground    #cccccc
selection_background    #264f78

# Cursor colors
cursor                  #ffffff
cursor_text_color       #1e1e1e

# kitty window border colors
active_border_color     #e7e7e7
inactive_border_color   #414140

# Tab bar colors
active_tab_foreground   #ffffff
active_tab_background   #3a3d41
inactive_tab_foreground #858485
inactive_tab_background #1e1e1e

# black
color0 #000000
color8 #666666

# red
color1 #f14c4c
color9 #cd3131

# green
color2  #23d18b
color10 #0dbc79

# yellow
color3  #f5f543
color11 #e5e510

# blue
color4  #3b8eea
color12 #2472c8

# magenta
color5  #d670d6
color13 #bc3fbc

# cyan
color6  #29b8db
color14 #11a8cd

# white
color7  #e5e5e5
color15 #e5e5e5

#: }}}

#: Shell Integration {{{

# Enable shell integration
shell_integration enabled

# Allow remote control for advanced features
allow_remote_control yes
listen_on unix:/tmp/kitty

#: }}}

#: Tab Bar {{{

# Tab bar style
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

#: }}}

#: Window Layout {{{

# Window padding
window_padding_width 4

# Hide window decorations (uncomment if you want)
# hide_window_decorations yes

#: }}}

#: Wayland Appearance {{{

# Match titlebar to terminal background color (seamless look)
wayland_titlebar_color background

# No transparency (fully opaque)
background_opacity 1.0

#: }}}

#: Performance {{{

# Scrollback buffer size
scrollback_lines 10000

# Repaint delay (lower = more responsive, higher = more efficient)
repaint_delay 10

# Input delay (lower = more responsive)
input_delay 3

# Sync to monitor refresh rate
sync_to_monitor yes

#: }}}

#: Misc {{{

# Enable copying to clipboard on selection
copy_on_select yes

# Confirm before closing
confirm_os_window_close 0

#: }}}
