# Kitty Configuration
# VSCode Dark Theme with Droid Sans Mono Nerd Font
linux_display_server x11

#: Fonts {{{

# Use Droid Sans Mono Nerd Font
font_family      DroidSansM Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Font size
font_size 11.0

# Disable ligatures if needed (uncomment to disable)
# disable_ligatures never

#: }}}

#: Theme - Cai {{{

# The basic colors
foreground              #d9e6f2
background              #09111a
selection_foreground    #d9e6f2
selection_background    #1e3348

# Cursor colors
cursor                  #d9e6f2
cursor_text_color       #09111a

# kitty window border colors
active_border_color     #8da3e9
inactive_border_color   #1e3040

# Tab bar colors
active_tab_foreground   #d9e6f2
active_tab_background   #1a2a3a
inactive_tab_foreground #506882
inactive_tab_background #09111a

# black
color0  #000000
color8  #808080

# red
color1  #ca274d
color9  #e98da3

# green
color2  #4dca27
color10 #a3e98d

# yellow
color3  #caa427
color11 #e9d48d

# blue
color4  #274dca
color12 #8da3e9

# magenta
color5  #a427ca
color13 #d48de9

# cyan
color6  #27caa4
color14 #8de9d4

# white
color7  #808080
color15 #ffffff

#: }}}

#: Shell Integration {{{

# Enable shell integration
shell_integration enabled

# Allow remote control for advanced features
allow_remote_control yes
listen_on unix:/tmp/kitty

#: }}}

#: Tab Bar {{{

# Tab bar style
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

#: }}}

#: Window Layout {{{

# Window padding
window_padding_width 4

# Hide window decorations (uncomment if you want)
# hide_window_decorations yes

#: }}}

#: Wayland Appearance {{{

# Match titlebar to terminal background color (seamless look)
wayland_titlebar_color background

# No transparency (fully opaque)
background_opacity 1.0

#: }}}

#: Performance {{{

# Scrollback buffer size
scrollback_lines 10000

# Repaint delay (lower = more responsive, higher = more efficient)
repaint_delay 10

# Input delay (lower = more responsive)
input_delay 3

# Sync to monitor refresh rate
sync_to_monitor yes

# Disable cursor blinking for smoother animations
cursor_blink_interval 0

# Disable audio bell
enable_audio_bell no

#: }}}

#: Keyboard Shortcuts {{{

# Copy and paste shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Windows-style copy/paste (ctrl+c copies if text selected, otherwise sends interrupt)
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# Ctrl+Enter sends Shift+Enter (kitty protocol) for newline in Claude Code
map ctrl+enter send_text all \e[13;2u

#: }}}

#: Misc {{{

# Enable copying to clipboard on selection
copy_on_select yes

# Confirm before closing
confirm_os_window_close 0

#: }}}
